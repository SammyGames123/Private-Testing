name: Pulse
options:
  bundleIdPrefix: au.com.imaginefashion
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Pulse:
    type: application
    platform: iOS
    sources:
      - path: Pulse
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: Pulse/Info.plist
      properties:
        CFBundleDisplayName: Pulse
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        NSCameraUsageDescription: Pulse uses the camera so you can record and post videos.
        NSMicrophoneUsageDescription: Pulse uses the microphone so your videos have sound.
        NSPhotoLibraryUsageDescription: Pulse needs access to your photo library so you can pick clips and images to share.
        NSPhotoLibraryAddUsageDescription: Pulse saves edited videos and photos to your library.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.com.imaginefashion.pulse
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
