name: Spilltop
options:
  bundleIdPrefix: com.spilltop
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "Q65PDQX7P7"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "3"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift.git
    from: "2.11.0"

targets:
  Spilltop:
    type: application
    platform: iOS
    sources:
      - path: Pulse
    dependencies:
      - package: Supabase
        product: Supabase
      - package: LiveKit
        product: LiveKit
    info:
      path: Pulse/Info.plist
      properties:
        CFBundleDisplayName: Spilltop
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        NSCameraUsageDescription: Spilltop uses the camera so you can record and post videos.
        NSMicrophoneUsageDescription: Spilltop uses the microphone so your videos have sound.
        NSPhotoLibraryUsageDescription: Spilltop needs access to your photo library so you can pick clips and images to share.
        NSPhotoLibraryAddUsageDescription: Spilltop saves edited videos and photos to your library.
        NSLocationWhenInUseUsageDescription: Spilltop uses your location to place your moments on the map for 24 hours.
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Pulse/Spilltop.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spilltop.app
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
